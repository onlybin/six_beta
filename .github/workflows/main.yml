name: 🚀 AI 量化监控流水线

on:
  schedule:
    # 每天北京时间 21:30 自动执行 (UTC时间 13:30)
    - cron: '30 13 * * *'
  workflow_dispatch: # 允许网页端手动点击运行

permissions:
  contents: write # 赋予机器人写入数据库和生成报告的权限

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取最新代码
        uses: actions/checkout@v3

      - name: 配置 Python 环境 (3.10)
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安装核心依赖库
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 执行数据抓取与量化推演
        run: |
          python main.py

      - name: 提交并推送最新数据 (SQLite & JSON & 报告)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add .
          git commit -m "📊 Auto-update: 量化数据仓同步与偏态监控报告更新" || echo "No changes to commit"
          git push
